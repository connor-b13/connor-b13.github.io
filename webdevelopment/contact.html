    <section class="contact_container">
        <h1>Contact Me</h1>
        <p>Have a question or want to get in touch? Send me a message below!</p>

        <form action="#" method="POST" class="contact_form">
            <div class="form_row">
                <div class="form_group title_group">
                    <label for="title">Title <span class="required">*</span> </label>
                    <select id="title" name="title">
                        <option value="" disabled selected>Select</option>
                        <option value="Mr.">Mr.</option>
                        <option value="Mrs.">Mrs.</option>
                        <option value="Ms.">Ms.</option>
                        <option value="Dr.">Dr.</option>
                        <option value="Prof.">Prof.</option>
                    </select>
                </div>
            
                <div class="form_group name_group">
                    <label for="fullname">Full Name <span class="required">*</span> </label>
                    <input type="text" id="fullname" placeholder="JohnDoe" required>
                </div>
            
                <div class="form_group">
                    <label for="subject">Regarding <span class="required">*</span> </label>
                    <select id="subject" name="subject">
                        <option value="" disabled selected>Select a subject...</option>
                        <option value="general">General Question</option>
                        <option value="collaboration">Project Collaboration</option>
                        <option value="recruiting">Employment Opportunity</option>
                        <option value="other">Other</option>
                    </select>
                </div>
                <div class="form_group email_group">
                    <label for="email">Email <span class="required">*</span> </label>
                    <input type="email" id="email" placeholder="JohnDoe@yourinstitution.com" required>
                </div>
            </div>
                <div class="form_group">
                    <label for="message">Message <span class="required">*</span></label>
                    <textarea id="message" name="message" rows="5" placeholder="Write your message here..." required></textarea>
                </div>
                <button type="submit" class="btn submit_btn">Send Message</button>
        </form>
    </section>


    <footer>

                github.com/connor-b13</li>      <!--I figured it would be more relevant to add a github link than a phone-->

    </footer>
